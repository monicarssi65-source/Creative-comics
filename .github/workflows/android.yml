name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permette avvio manuale dalla tab Actions

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java (richiesto da Gradle/Android) ──────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Dipendenze npm ──────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Build Vite (frontend) ───────────────────────────────────────────
      - name: Build frontend
        run: npm run build:mobile
        env:
          CAPACITOR_BUILD: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # ── 7. Inizializza progetto Android Capacitor ──────────────────────────
      - name: Init Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android

      # ── 8. Rendi gradlew eseguibile ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 10. Build APK debug ────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── 11. Rinomina APK con versione e data ───────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/ComicLabAI-${DATE}-debug.apk
          echo "APK_NAME=ComicLabAI-${DATE}-debug.apk" >> $GITHUB_ENV
          echo "✅ APK: ComicLabAI-${DATE}-debug.apk"
          ls -lh apk-output/

      # ── 12. Upload APK come Artifact ───────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicLab-APK-debug
          path: apk-output/*.apk
          retention-days: 30

      # ── 13. Riepilogo nel job summary ─────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ APK Compilato" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Scarica dalla tab **Artifacts** qui sopra." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Come installare" >> $GITHUB_STEP_SUMMARY
          echo "1. Copia l'APK sul telefono Android" >> $GITHUB_STEP_SUMMARY
          echo "2. Vai in **Impostazioni → Sicurezza → Sorgenti sconosciute** (abilita)" >> $GITHUB_STEP_SUMMARY
          echo "3. Apri il file APK e installa" >> $GITHUB_STEP_SUMMARY
